<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Matrix: Ultimate Excel Workspace</title>
    <style>
        :root {
            --neon-green: #107c41;
            --cyber-green: #1f9a55;
            --dark-bg: #0b0f19;
            --panel-bg: #131926;
            --border-color: #222e43;
            --text-glow: 0 0 10px rgba(31, 154, 85, 0.4);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { 
            background-color: var(--dark-bg); 
            color: #e2e8f0;
            margin: 0; 
            padding: 30px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        /* Ultimate Dashboard Split Layout */
        .master-wrapper {
            display: flex;
            width: 100%;
            max-width: 1300px;
            gap: 25px;
        }

        /* LEFT SIDE BAR: VERTICAL INFINITE SCROLLING MARQUEE TICKER */
        .ticker-sidebar {
            width: 280px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 750px;
            position: relative;
        }

        .ticker-sidebar::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(transparent, var(--panel-bg));
            pointer-events: none;
        }

        .ticker-title {
            color: #fff;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--neon-green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ticker-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .ticker-track {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: absolute;
            width: 100%;
            animation: verticalMarquee 25s linear infinite;
        }

        .ticker-track:hover {
            animation-play-state: paused;
        }

        .ticker-card {
            background: #192234;
            border-left: 4px solid var(--cyber-green);
            padding: 12px;
            border-radius: 0 6px 6px 0;
            font-size: 12px;
            transition: 0.2s;
        }

        .ticker-card .card-name {
            font-family: 'Consolas', monospace;
            font-weight: bold;
            color: #fff;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .ticker-card .card-use {
            color: #94a3b8;
            line-height: 1.4;
        }

        /* RIGHT MAIN PANEL PANELS */
        .main-workspace {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 750px;
        }

        h1 { margin: 0 0 5px 0; font-size: 28px; color: #fff; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        /* Modern Navigation Dashboard Header Controls */
        .menu-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: #0f1420;
            padding: 6px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .nav-btn.active-tab {
            background: var(--neon-green);
            color: #fff;
            box-shadow: var(--text-glow);
        }

        .nav-btn:hover:not(.active-tab) {
            background: #192234;
            color: #fff;
        }

        /* App Layout Sections switching */
        .app-view { display: none; }
        .active-view { display: flex; flex-direction: column; flex: 1; min-height: 0; }

        /* Instant Search filter interface components */
        .search-container { margin-bottom: 20px; }
        .search-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 14px;
            background: #0f1420;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: 0.2s;
        }
        .search-input:focus {
            border-color: var(--cyber-green);
            box-shadow: var(--text-glow);
        }

        /* Elegant Grid Table Interface Matrix */
        .table-scroll {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #0f1420;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th {
            background-color: #0f1420;
            color: var(--cyber-green);
            padding: 14px;
            position: sticky;
            top: 0;
            border-bottom: 2px solid var(--border-color);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 10;
        }

        td { padding: 14px; border-bottom: 1px solid var(--border-color); vertical-align: top; line-height: 1.5; }
        tr:hover { background-color: rgba(16, 124, 65, 0.04); }
        tr.hidden-row { display: none; }

        .tag-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .tag-badge.beg { background: rgba(39, 174, 96, 0.15); color: #2ecc71; border: 1px solid rgba(39, 174, 96, 0.3); }
        .tag-badge.adv { background: rgba(230, 126, 34, 0.15); color: #e67e22; border: 1px solid rgba(230, 126, 34, 0.3); }

        .formula-tag {
            font-family: 'Consolas', monospace;
            color: #ff6b6b;
            font-weight: bold;
            background: #221a24;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        /* Live Sandbox Sheet UI Engine Layout */
        .guide-box {
            background: #101c18;
            border-left: 4px solid var(--cyber-green);
            padding: 15px;
            font-size: 13px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            color: #a7f3d0;
            line-height: 1.6;
        }

        .formula-bar-container {
            background: #0f1420;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .fx-indicator {
            font-family: serif;
            font-style: italic;
            font-weight: 900;
            color: var(--cyber-green);
            font-size: 22px;
            user-select: none;
        }

        .formula-bar-field {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            color: #fff;
            outline: none;
        }

        .evaluate-action-btn {
            background-color: var(--neon-green);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .evaluate-action-btn:hover {
            background-color: var(--cyber-green);
            box-shadow: var(--text-glow);
        }

        /* Console Output Node */
        .sandbox-output {
            flex: 1;
            background: #070a12;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            font-family: 'Consolas', monospace;
            color: #38bdf8;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Ticker Vertical Loop Animation Keyframe */
        @keyframes verticalMarquee {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
    </style>
</head>
<body>

    <div class="master-wrapper">
        
        <!-- Left Sidebar Module (Duplicated cards to ensure loop seam visibility) -->
        <aside class="ticker-sidebar">
            <div class="ticker-title">⚡ Matrix Stream</div>
            <div class="ticker-container">
                <div class="ticker-track" id="tickerTrack">
                    <!-- Set 1 -->
                    <div class="ticker-card">
                        <div class="card-name">XLOOKUP</div>
                        <div class="card-use">Supersedes VLOOKUP logic natively.</div>
                    </div>
